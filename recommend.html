<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>每日饮食推荐</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="data.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Fira Sans','sans-serif'], mono: ['Fira Code','monospace'] }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family:'Fira Sans',sans-serif; background:#F8FAFC; overscroll-behavior:none; }
    .font-data { font-family:'Fira Code',monospace; }
    .bar-fill { transition:width 0.5s ease-out; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .meal-card { animation:fadeIn 0.15s ease-out; }
  </style>
</head>
<body class="min-h-screen pb-20">

  <!-- 顶栏 -->
  <div id="topBar" class="sticky top-0 z-30 bg-emerald-600 text-white px-4 py-3 flex justify-between items-center shadow">
    <div>
      <div class="font-bold text-lg">每日饮食推荐</div>
      <div class="text-xs opacity-80" id="dateDisplay"></div>
    </div>
    <button id="settingsBtn" class="bg-white/20 px-3 py-1.5 rounded-lg text-sm active:bg-white/30">设置</button>
  </div>

  <!-- 用户信息摘要 -->
  <div class="mx-4 mt-3 flex flex-wrap gap-x-3 gap-y-0.5 text-xs text-slate-500">
    <span id="profileBar">70kg · 170cm · 30岁 · 男 · 中度运动</span>
  </div>

  <!-- 目标进度卡片 -->
  <div id="targetCard" class="mx-4 mt-2 p-3 bg-emerald-50 border border-emerald-200 rounded-xl">
    <!-- 蛋白质 -->
    <div class="flex justify-between items-center mb-1">
      <span class="text-sm font-semibold text-emerald-800">蛋白质目标</span>
      <span class="text-lg font-bold text-emerald-600 font-data" id="targetDisplay">120g</span>
    </div>
    <div class="bg-emerald-100 rounded-full h-2 overflow-hidden">
      <div id="progressBar" class="bg-emerald-500 h-full rounded-full bar-fill" style="width:0%"></div>
    </div>
    <div class="text-xs text-slate-500 mt-0.5" id="progressText">已选 0g / 120g</div>
    <!-- 碳水 -->
    <div class="flex justify-between items-center mb-1 mt-2">
      <span class="text-sm font-semibold text-amber-800">碳水目标</span>
      <span class="text-lg font-bold text-amber-600 font-data" id="carbsTargetDisplay">250g</span>
    </div>
    <div class="bg-amber-100 rounded-full h-2 overflow-hidden">
      <div id="carbsProgressBar" class="bg-amber-500 h-full rounded-full bar-fill" style="width:0%"></div>
    </div>
    <div class="text-xs text-slate-500 mt-0.5" id="carbsProgressText">已选 0g / 250g</div>
    <!-- 热量 -->
    <div class="flex justify-between items-center mb-1 mt-2">
      <span class="text-sm font-semibold text-rose-700">热量目标</span>
      <span class="text-lg font-bold text-rose-600 font-data" id="caloriesTargetDisplay">2000kcal</span>
    </div>
    <div class="bg-rose-100 rounded-full h-2 overflow-hidden">
      <div id="caloriesProgressBar" class="bg-rose-500 h-full rounded-full bar-fill" style="width:0%"></div>
    </div>
    <div class="text-xs text-slate-500 mt-0.5" id="caloriesProgressText">已选 0kcal / 2000kcal</div>
    <!-- 脂肪/纤维概览 -->
    <div class="flex justify-between items-center mt-2">
      <span class="text-xs text-slate-500" id="fatFiberDisplay">脂肪 0g · 纤维 0g</span>
      <span class="text-xs text-slate-500" id="totalCost">预估 ¥0</span>
    </div>
  </div>

  <!-- 四餐容器 -->
  <div id="mealsContainer" class="mx-4 mt-3 flex flex-col gap-3"></div>

  <!-- 底部按钮 -->
  <div class="mx-4 mt-4 pb-4">
    <button id="regenerateAllBtn" class="w-full bg-emerald-600 text-white py-3.5 rounded-xl text-base font-semibold active:bg-emerald-700">
      全部重新生成
    </button>
  </div>

  <!-- 设置弹窗 -->
  <div id="settingsModal" class="fixed inset-0 z-40 hidden">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" id="settingsOverlay"></div>
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-5 max-h-[80vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-lg">推荐设置</h3>
        <button id="settingsClose" class="text-slate-400 text-2xl leading-none">&times;</button>
      </div>
      <!-- 场景预设 -->
      <div class="mb-4">
        <p class="text-sm font-medium text-slate-700 mb-2">快捷场景</p>
        <div class="flex items-center gap-2 mb-2">
          <label class="text-sm text-slate-600">体重</label>
          <input type="number" id="weightInput" class="w-16 border border-slate-300 rounded-lg px-2 py-1 text-sm font-data text-center" min="30" max="200" value="70">
          <span class="text-xs text-slate-400">kg</span>
          <label class="text-sm text-slate-600 ml-1">身高</label>
          <input type="number" id="heightInput" class="w-16 border border-slate-300 rounded-lg px-2 py-1 text-sm font-data text-center" min="120" max="220" value="170">
          <span class="text-xs text-slate-400">cm</span>
          <label class="text-sm text-slate-600 ml-1">年龄</label>
          <input type="number" id="ageInput" class="w-14 border border-slate-300 rounded-lg px-2 py-1 text-sm font-data text-center" min="15" max="80" value="30">
        </div>
        <div class="flex items-center gap-2 mb-2">
          <label class="text-sm text-slate-600">性别</label>
          <label class="text-sm text-slate-600">
            <input type="radio" name="gender" id="genderMale" value="male" checked class="mr-0.5"> 男
          </label>
          <label class="text-sm text-slate-600">
            <input type="radio" name="gender" id="genderFemale" value="female" class="mr-0.5"> 女
          </label>
          <label class="text-sm text-slate-600 ml-2">活动量</label>
          <select id="activitySelect" class="border border-slate-300 rounded-lg px-2 py-1 text-sm">
            <option value="sedentary">久坐</option>
            <option value="light">轻度运动</option>
            <option value="moderate" selected>中度运动</option>
            <option value="active">高强度运动</option>
            <option value="extreme">极高强度</option>
          </select>
        </div>
        <div class="flex gap-2">
          <button type="button" class="preset-btn text-sm px-4 py-2 rounded-lg border-2 font-medium bg-white text-slate-600 border-slate-200" data-preset="muscle">增肌</button>
          <button type="button" class="preset-btn text-sm px-4 py-2 rounded-lg border-2 font-medium bg-white text-slate-600 border-slate-200" data-preset="cut">减脂</button>
          <button type="button" class="preset-btn text-sm px-4 py-2 rounded-lg border-2 font-medium bg-white text-slate-600 border-slate-200" data-preset="balance">均衡</button>
        </div>
        <p class="text-xs text-slate-400 mt-1">点击场景自动填入目标值，可手动微调</p>
      </div>
      <div class="mb-3">
        <label class="block text-sm font-medium text-slate-700 mb-1">每日蛋白质目标 (g)</label>
        <input type="number" id="proteinInput" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-lg font-data" min="50" max="300" value="120">
      </div>
      <div class="mb-3">
        <label class="block text-sm font-medium text-slate-700 mb-1">每日碳水目标 (g)</label>
        <input type="number" id="carbsInput" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-lg font-data" min="50" max="500" value="250">
      </div>
      <div class="mb-3">
        <label class="block text-sm font-medium text-slate-700 mb-1">每日热量目标 (kcal)</label>
        <input type="number" id="caloriesInput" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-lg font-data" min="1000" max="5000" value="2000">
      </div>
      <div class="mb-3">
        <label class="block text-sm font-medium text-emerald-700 mb-2">蛋白质餐次比例</label>
        <div id="proteinRatioSliders" class="space-y-3"></div>
        <div class="text-xs text-slate-400 mt-1 text-right" id="proteinRatioSum">合计 100%</div>
      </div>
      <div class="mb-3">
        <label class="block text-sm font-medium text-amber-700 mb-2">碳水餐次比例</label>
        <div id="carbsRatioSliders" class="space-y-3"></div>
        <div class="text-xs text-slate-400 mt-1 text-right" id="carbsRatioSum">合计 100%</div>
      </div>
      <div class="mb-3">
        <div id="excludeSection"></div>
      </div>
      <div class="mb-4">
        <div id="oilSection"></div>
      </div>
      <button id="settingsSave" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-semibold active:bg-emerald-700">保存</button>
    </div>
  </div>

  <script src="recommend.js"></script>
</body>
</html>
